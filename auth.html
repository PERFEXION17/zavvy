<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome To Zavvy!</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="shortcut icon" href="/assets/img/Z!.webp" type="image/x-icon">
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/thin/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8054586171745918"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="loading-screen" class="loading-overlay">
      <div class="loading-img">
        <img src="/assets/img/Z!.webp" alt="loading img" />
      </div>
    </div>

    <div class="auth-container">
      <div class="auth-bg">
        <div class="logo auth-logo">
          <img src="/assets/img/zavvy!.webp" alt="zavvy logo" />
        </div>
      </div>

      <main class="auth-pad">
        <section aria-labelledby="auth-heading">
          <h1 id="auth-heading" class="sr-only">Authentication</h1>

          <!-- Login Card -->
          <article id="login-card" class="auth-card hidden">
            <h2>Login</h2>
            <form id="login-form">
              <div class="form-group">
                <label for="login-email" class="sr-only">Email Address</label>
                <input
                  type="email"
                  id="login-email"
                  name="email"
                  placeholder="zavvy@example.com"
                  required
                  autocomplete="username"
                />
              </div>
              <div class="form-group password-container">
                <label for="login-password" class="sr-only">Password</label>
                <input
                  type="password"
                  id="login-password"
                  class="password-input"
                  name="password"
                  required
                  autocomplete="current-password"
                />
                <i class="ph ph-eye" id="togglePassword"></i>
              </div>
              <div class="auth-btn-con">
                <button type="submit" id="btn-login" class="btn-trace auth-btn">
                  <span>Login</span>
                  <svg aria-hidden="true" focusable="false">
                    <rect
                      x="0"
                      y="0"
                      rx="5"
                      ry="5"
                      fill="none"
                      width="100%"
                      height="100%"
                    ></rect>
                  </svg>
                </button>
                <button
                  id="google-login-btn"
                  class="btn-trace auth-btn"
                  type="button"
                >
                  <i class="ph ph-google-logo"></i>
                </button>
              </div>
              <p>
                Don't have an Account?
                <a href="auth.html?mode=signup">Sign Up</a>
              </p>
            </form>
          </article>

          <!-- Sign Up Card -->
          <article id="signup-card" class="auth-card hidden">
            <h2>Sign Up</h2>
            <form id="signup-form">
              <div class="form-group">
                <label for="signup-email" class="sr-only">Email Address</label>
                <input
                  type="email"
                  id="signup-email"
                  name="email"
                  placeholder="zavvy@example.com"
                  required
                  autocomplete="email"
                />
              </div>
              <div class="form-group password-container">
                <label for="signup-password" class="sr-only">Password</label>
                <input
                  type="password"
                  id="signup-password"
                  class="password-input"
                  name="password"
                  required
                  autocomplete="new-password"
                />
                <i class="ph ph-eye" id="togglePassword"></i>
              </div>
              <div class="auth-btn-con">
                <button
                  type="submit"
                  id="btn-signup"
                  class="btn-trace auth-btn"
                >
                  <span>Sign Up</span>
                  <svg aria-hidden="true" focusable="false">
                    <rect
                      x="0"
                      y="0"
                      rx="5"
                      ry="5"
                      fill="none"
                      width="100%"
                      height="100%"
                    ></rect>
                  </svg>
                </button>
                <button id="google-signup-btn" class="btn-trace auth-btn">
                  <i class="ph ph-google-logo"></i>
                </button>
              </div>
              <p>
                Already have an Account?
                <a href="auth.html?mode=login">Log In</a>
              </p>
            </form>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="/assets/js/firebase-config.js"></script>
    <script type="module" src="/assets/js/main.js"></script>
  </body>
</html>
