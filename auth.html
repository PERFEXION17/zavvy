<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome To PrepArena</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/thin/style.css"
    />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8054586171745918"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="login-bg">
    <!-- Global Loading Screen -->
    <div id="loading-screen" class="loading-overlay">
      <div class="spinner" aria-label="Loading PrepArena"></div>
    </div>

    <header style="background-color: transparent">
      <nav style="background-color: transparent">
        <div class="logo">
          <a href="index.html" style="color: var(--neutral)">PrepArena</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="auth-container" aria-labelledby="auth-heading">
        <h1 id="auth-heading" class="sr-only">Authentication</h1>

        <!-- Login Card -->
        <article id="login-card" class="auth-card hidden">
          <h2>Login</h2>
          <form id="login-form">
            <div class="form-group">
              <label for="login-email" class="sr-only">Email Address</label>
              <input
                type="email"
                id="login-email"
                name="email"
                placeholder="preparena@example.com"
                required
                autocomplete="username"
              />
            </div>
            <div class="form-group">
              <label for="login-password" class="sr-only">Password</label>
              <input
                type="password"
                id="login-password"
                name="password"
                required
                autocomplete="current-password"
              />
            </div>
            <div class="auth-btn-con">
              <button type="submit" id="btn-login" class="btn-trace auth-btn">
                <span>Login</span>
                <svg aria-hidden="true" focusable="false">
                  <rect
                    x="0"
                    y="0"
                    rx="5"
                    ry="5"
                    fill="none"
                    width="100%"
                    height="100%"
                  ></rect>
                </svg>
              </button>
              <button
                id="google-login-btn"
                class="btn-trace auth-btn"
                type="button"
              >
                <i class="ph-thin ph-google-logo"></i>
              </button>
            </div>
            <p>
              Don't have an Account? <a href="auth.html?mode=signup">Sign Up</a>
            </p>
          </form>
        </article>

        <!-- Sign Up Card -->
        <article id="signup-card" class="auth-card hidden">
          <h2>Sign Up</h2>
          <form id="signup-form">
            <div class="form-group">
              <label for="signup-email" class="sr-only">Email Address</label>
              <input
                type="email"
                id="signup-email"
                name="email"
                placeholder="preparena@example.com"
                required
                autocomplete="email"
              />
            </div>
            <div class="form-group">
              <label for="signup-password" class="sr-only">Password</label>
              <input
                type="password"
                id="signup-password"
                name="password"
                required
                autocomplete="new-password"
              />
            </div>
            <div class="auth-btn-con">
              <button
                type="submit"
                id="btn-signup"
                class="btn-trace auth-btn"
                type="button"
              >
                <span>Sign Up</span>
                <svg aria-hidden="true" focusable="false">
                  <rect
                    x="0"
                    y="0"
                    rx="5"
                    ry="5"
                    fill="none"
                    width="100%"
                    height="100%"
                  ></rect>
                </svg>
              </button>
              <button id="google-signup-btn" class="btn-trace auth-btn">
                <i class="ph-thin ph-google-logo"></i>
              </button>
            </div>
            <p>
              Already have an Account? <a href="auth.html?mode=login">Log In</a>
            </p>
          </form>
        </article>
      </section>
    </main>

    <script type="module" src="/assets/js/firebase-config.js"></script>
    <script type="module" src="/assets/js/auth.js"></script>
    <script type="module" src="/assets/js/script.js"></script>
  </body>
</html>
