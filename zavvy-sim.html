<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zavvy! | Sim</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="shortcut icon" href="/assets/img/Z!.webp" type="image/x-icon" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/thin/style.css"
    />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8054586171745918"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="exam-mode">
      <div id="loading-screen" class="loading-overlay">
        <div class="loading-img">
          <img src="/assets/img/Z!.webp" alt="loading img" />
        </div>
      </div>

      <div class="exam-header">
        <div class="exam-brand">
          <img src="/assets/img/zavvy!-sim.webp" alt="Zavvy!" width="100" />
        </div>
        <div class="exam-timer" id="timer">02:00:00</div>
        <button id="submit-exam-btn" class="btn-trace">
          <span>Submit</span>
          <svg>
            <rect
              x="0"
              y="0"
              rx="5"
              ry="5"
              fill="none"
              width="100%"
              height="100%"
            ></rect>
          </svg>
        </button>
      </div>

      <div class="exam-main">
        <!-- Subject Navigation -->
        <div class="subject-nav" id="subject-nav"></div>

        <!-- Question Area -->
        <div class="question-container">
          <div class="progress-info">
            <span id="current-subject-display">English</span>
            <span id="question-counter">1 of 0</span>
          </div>

          <div id="question-text" class="question-text"></div>

          <div id="options-area" class="options-area"></div>
        </div>
      </div>

      <!-- Bottom Navigation -->
      <div class="exam-footer">
        <button id="prev-btn" class="btn-trace">
          <span>Previous</span>
          <svg>
            <rect
              x="0"
              y="0"
              rx="5"
              ry="5"
              fill="none"
              width="100%"
              height="100%"
            ></rect>
          </svg>
        </button>
        <button id="next-btn" class="btn-trace">
          <span>Next</span>
          <svg>
            <rect
              x="0"
              y="0"
              rx="5"
              ry="5"
              fill="none"
              width="100%"
              height="100%"
            ></rect>
          </svg>
        </button>
      </div>

      <!-- Loading / Result Overlay -->
      <div id="result-overlay" class="result-overlay hidden"></div>
    </div>

    <script type="module" src="./assets/js/zavvy-sim.js"></script>
    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
